<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balade contée immersive</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom right, #1e3a8a, #facc15);
      font-family: Arial, sans-serif;
    }

    #map { height: 400px; }

    .card {
      transition: all 0.3s ease;
    }

    .progress-bar {
      height: 8px;
      background-color: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background-color: #facc15;
    }
  </style>
</head>

<body class="text-white min-h-screen flex flex-col">

<header class="text-center py-6">
  <h1 class="text-3xl font-bold">Balade contée immersive</h1>
  <p>Découvrez les légendes une à une…</p>
</header>

<div class="w-full max-w-6xl mx-auto px-4 mb-6">
  <div id="map" class="rounded-lg"></div>
</div>

<main id="etapes" class="grid md:grid-cols-2 gap-6 px-4 pb-20 max-w-6xl mx-auto"></main>

<button onclick="resetProgress()" class="fixed bottom-4 right-4 bg-black text-white px-4 py-2 rounded">
  Reset
</button>

<script>

//  7 ÉTAPES
const etapesData = [
  {
    titre: "1. Le début de la balade",
    personnage: "Léonard ",
    texte: "Un secret dort sous les pierres du château...",
    fichier: "conte1.mp3",
    coords: [46.212159, 4.255637]
  },
  {
    titre: "2. L’étang noir",
    personnage: "gilda et son fils",
    texte: "Une lumière étrange apparaît la nuit...",
    fichier: "conte2.mp3",
    coords: [46.212364, 4.255125]
  },
  {
    titre: "3. St pierre et st paul",
    personnage: "Les statues magique",
    texte: "Un symbole laissé pour guider les âmes...",
    fichier: "conte3.mp3",
    coords: [46.214069, 4.255620]
  },
  {
    titre: "4. Les fayettes",
    personnage: "Un garde",
    texte: "Ce passage n’apparaît qu’à ceux qui savent regarder...",
    fichier: "conte4.mp3",
    coords: [46.216000, 4.254000]
  },
  {
    titre: "5. La pierre qui vire",
    personnage: "Une villageoise",
    texte: "On dit que ce puits murmure des histoires anciennes...",
    fichier: "conte5.mp3",
    coords: [46.217000, 4.253000]
  },
  {
    titre: "6. Le pont combabon",
    personnage: "Un enfant",
    texte: "Des rires résonnent encore dans cette maison vide...",
    fichier: "conte6.mp3",
    coords: [46.218000, 4.252000]
  },
  {
    titre: "7. Gwenaelle et le léopard",
    personnage: "Le narrateur",
    texte: "Toutes les légendes mènent à une vérité oubliée...",
    fichier: "conte7.mp3",
    coords: [46.219000, 4.251000]
  }
];

// progression sauvegardée
let etapeDebloquee = localStorage.getItem("progression")
  ? parseInt(localStorage.getItem("progression"))
  : 0;

// carte
const map = L.map("map").setView([46.2122, 4.25556], 14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

const container = document.getElementById("etapes");
const markers = [];

// MAJ affichage
function updateUnlock() {
  document.querySelectorAll(".card").forEach((card, i) => {
    const audio = card.querySelector("audio");

    if (i <= etapeDebloquee) {
      card.classList.remove("opacity-50");
      audio.disabled = false;
    } else {
      card.classList.add("opacity-50");
      audio.disabled = true;
    }
  });
}

// création
etapesData.forEach((etape, index) => {

  const card = document.createElement("div");
  card.className = "card bg-white text-black p-5 rounded-xl shadow";

  if (index !== 0) card.classList.add("opacity-50");

  card.innerHTML = `
    <h2 class="font-bold text-lg">${etape.titre}</h2>
    <p class="italic text-sm">👤 ${etape.personnage}</p>
    <p class="text-sm my-2">${etape.texte}</p>

    <audio id="audio${index}" controls class="w-full">
      <source src="audio/${etape.fichier}" type="audio/mpeg">
    </audio>

    <div class="progress-bar">
      <div id="progress${index}" class="progress-fill"></div>
    </div>

    <button onclick="focusOnMarker(${index})"
      class="mt-3 bg-yellow-400 px-3 py-2 rounded">
      📍 Voir sur la carte
    </button>
  `;

  container.appendChild(card);

  const audio = card.querySelector(`#audio${index}`);
  const progress = card.querySelector(`#progress${index}`);

  // progression audio
  audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
  });

  // déblocage
  audio.addEventListener("ended", () => {
    if (index === etapeDebloquee) {
      etapeDebloquee++;
      localStorage.setItem("progression", etapeDebloquee);

      updateUnlock();

      alert("✨ Nouvelle étape débloquée !");

      if (markers[etapeDebloquee]) {
        focusOnMarker(etapeDebloquee);
      }
    }
  });

  etape.scrollToCard = () => {
    card.scrollIntoView({ behavior: "smooth" });
  };

  const marker = L.marker(etape.coords).addTo(map);

  marker.bindPopup(`<b>${etape.titre}</b>`)
    .on("click", etape.scrollToCard);

  markers.push(marker);

});

// focus
function focusOnMarker(index) {
  map.setView(markers[index].getLatLng(), 16);
  markers[index].openPopup();
}

// reset
function resetProgress() {
  localStorage.removeItem("progression");
  location.reload();
}

// init
updateUnlock();

</script>

</body>
</html>
